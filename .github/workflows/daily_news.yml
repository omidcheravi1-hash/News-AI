name: Daily AI News Digest

on:
  schedule:
    # 04:30 UTC = 08:00 Tehran winter (IRST = UTC+3:30)
    - cron: "30 4 * * *"
    # 03:30 UTC = 08:00 Tehran summer (IRDT = UTC+4:30)
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Force send regardless of Tehran time (for testing)"
        type: boolean
        default: true

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily AI news digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # workflow_dispatch always forces send; schedule checks Tehran time
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python main.py
